DEFAULT menu.c32
PROMPT 0
TIMEOUT 50

MENU TITLE PXE Boot Menu

LABEL proxmox-auto
MENU LABEL Install Proxmox VE (Auto)
KERNEL http://__SERVER_IP__/proxmox/boot/linux26
APPEND initrd=http://__SERVER_IP__/proxmox/boot/initrd.img \
ramdisk_size=16777216 \
root=/dev/ram0 \
rw \
auto=true \
url=http://__SERVER_IP__/configs/answer.toml

LABEL proxmox-manual
MENU LABEL Install Proxmox VE (Manual)
KERNEL http://__SERVER_IP__/proxmox/boot/linux26
APPEND initrd=http://__SERVER_IP__/proxmox/boot/initrd.img \
ramdisk_size=16777216 \
root=/dev/ram0 \
rw
