DEFAULT vesamenu.c32
PROMPT 0
TIMEOUT 50

MENU TITLE ── harx-prox PXE Boot Menu ──
MENU BACKGROUND #00000000
MENU COLOR title    1;36;40   #ffffffff #00000000
MENU COLOR border   30;40     #ffffffff #00000000
MENU COLOR sel      7;37;40   #ffffffff #50208000

# ── Automated install (uses answer.toml) ─────────────────────
LABEL proxmox-auto
  MENU LABEL ^1  Install Proxmox VE 8 (Automated)
  KERNEL http://__SERVER_IP__/proxmox/boot/linux26
  APPEND initrd=http://__SERVER_IP__/proxmox/boot/initrd.img \
         ramdisk_size=16777216 \
         root=/dev/ram0 \
         rw \
         quiet \
         proxmox-start-default-network=1 \
         auto=true \
         url=http://__SERVER_IP__/configs/answer.toml

# ── Manual install (interactive installer) ───────────────────
LABEL proxmox-manual
  MENU LABEL ^2  Install Proxmox VE 8 (Manual)
  KERNEL http://__SERVER_IP__/proxmox/boot/linux26
  APPEND initrd=http://__SERVER_IP__/proxmox/boot/initrd.img \
         ramdisk_size=16777216 \
         root=/dev/ram0 \
         rw

# ── Local boot fallback ──────────────────────────────────────
LABEL local
  MENU LABEL ^3  Boot from local disk
  LOCALBOOT 0
